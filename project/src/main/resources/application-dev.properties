io.faceapp.recognitionfaces = C:\\Users\\jeffe\\Documents\\Github\\Face-App\\project\\faces_recognition
io.faceapp.haarcascade=opencv/haarcascade_frontalface_default.xml

#ConfigurańŃo AWS
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}
